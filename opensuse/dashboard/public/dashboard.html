<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LiveDialAI - Voice Bot Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
      min-height: 100vh;
      color: #e2e8f0;
    }
    
    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem;
    }
    
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      background: rgba(30, 41, 59, 0.8);
      padding: 1.5rem;
      border-radius: 12px;
    }
    
    h1 { font-size: 2rem; color: #f1f5f9; }
    
    .logout-btn {
      background: #ef4444;
      color: white;
      border: none;
      padding: 0.6rem 1.2rem;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
    }
    
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1.5rem;
      margin-bottom: 2rem;
    }
    
    .stat-card {
      background: rgba(30, 41, 59, 0.9);
      padding: 1.5rem;
      border-radius: 12px;
      border: 1px solid rgba(148, 163, 184, 0.2);
      border-left: 4px solid #3b82f6;
      transition: transform 0.2s;
    }
    
    .stat-card:hover {
      transform: translateY(-2px);
    }
    
    .stat-label {
      color: #94a3b8;
      font-size: 0.875rem;
      margin-bottom: 0.5rem;
    }
    
    .stat-value {
      font-size: 2rem;
      font-weight: bold;
      color: #f1f5f9;
    }
    
    .stat-subtext {
      font-size: 0.75rem;
      color: #94a3b8;
      margin-top: 0.25rem;
    }
    
    .stat-card.positive {
      border-left-color: #22c55e;
    }
    
    .stat-card.positive .stat-value { color: #22c55e; }
    
    .stat-card.negative {
      border-left-color: #ef4444;
    }
    
    .stat-card.negative .stat-value { color: #ef4444; }
    
    .stat-card.audio {
      border-left-color: #8b5cf6;
    }
    
    .stat-card.audio .stat-value { color: #a78bfa; }
    
    .calls-section {
      background: rgba(30, 41, 59, 0.9);
      border-radius: 12px;
      padding: 1.5rem;
      border: 1px solid rgba(148, 163, 184, 0.2);
    }
    
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      gap: 1rem;
    }
    
    .filter-buttons button {
      background: rgba(51, 65, 85, 0.8);
      border: 1px solid rgba(148, 163, 184, 0.3);
      color: #cbd5e1;
      padding: 0.5rem 1rem;
      border-radius: 6px;
      cursor: pointer;
      margin-left: 0.5rem;
      transition: all 0.2s;
    }
    
    .filter-buttons button:hover {
      background: rgba(59, 130, 246, 0.3);
    }
    
    .filter-buttons button.active {
      background: #3b82f6;
      color: white;
      border-color: #3b82f6;
    }
    
    table {
      width: 100%;
      border-collapse: collapse;
    }
    
    thead {
      background: rgba(51, 65, 85, 0.6);
    }
    
    th, td {
      padding: 1rem;
      text-align: left;
      border-bottom: 1px solid rgba(148, 163, 184, 0.1);
    }
    
    th {
      font-weight: 600;
      color: #cbd5e1;
      font-size: 0.875rem;
      text-transform: uppercase;
    }
    
    tbody tr {
      transition: background 0.2s;
      cursor: pointer;
    }
    
    tbody tr:hover {
      background: rgba(51, 65, 85, 0.4);
    }
    
    .status-badge {
      display: inline-block;
      padding: 0.25rem 0.75rem;
      border-radius: 12px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    
    .status-badge.positiv {
      background: rgba(34, 197, 94, 0.2);
      color: #22c55e;
    }
    
    .status-badge.negativ {
      background: rgba(239, 68, 68, 0.2);
      color: #ef4444;
    }
    
    .status-badge.unklar {
      background: rgba(148, 163, 184, 0.2);
      color: #94a3b8;
    }
    
    .audio-icon {
      font-size: 1.2rem;
      cursor: pointer;
      transition: transform 0.2s;
    }
    
    .audio-icon:hover {
      transform: scale(1.2);
    }
    
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      z-index: 1000;
      overflow-y: auto;
    }
    
    .modal.active { display: flex; }
    
    .modal-content {
      background: #1e293b;
      max-width: 900px;
      width: 90%;
      margin: 2rem auto;
      border-radius: 16px;
      overflow: hidden;
      animation: modalSlideIn 0.3s ease-out;
    }
    
    @keyframes modalSlideIn {
      from { transform: translateY(-50px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    
    .modal-header {
      background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
      padding: 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .modal-header h2 {
      color: white;
      font-size: 1.5rem;
      margin: 0;
    }
    
    .close-btn {
      background: rgba(255, 255, 255, 0.2);
      border: none;
      color: white;
      font-size: 1.5rem;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }
    
    .close-btn:hover {
      background: rgba(255, 255, 255, 0.3);
    }
    
    .modal-body {
      padding: 1.5rem;
      max-height: 70vh;
      overflow-y: auto;
    }
    
    .info-section {
      background: rgba(51, 65, 85, 0.4);
      padding: 1.5rem;
      border-radius: 12px;
      margin-bottom: 1.5rem;
      border-left: 4px solid #3b82f6;
    }
    
    .info-section.audio-section {
      background: rgba(59, 130, 246, 0.1);
      border-left-color: #8b5cf6;
    }
    
    .info-section h3 {
      color: #f1f5f9;
      margin-bottom: 1rem;
      font-size: 1.125rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    
    .info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
    }
    
    .info-item {
      display: flex;
      flex-direction: column;
    }
    
    .info-label {
      color: #94a3b8;
      font-size: 0.75rem;
      text-transform: uppercase;
      margin-bottom: 0.25rem;
    }
    
    .info-value {
      color: #e2e8f0;
      font-size: 1rem;
      font-weight: 600;
    }
    
    .info-value a {
      color: #60a5fa;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
      transition: color 0.2s;
    }
    
    .info-value a:hover {
      color: #93c5fd;
    }
    
    .audio-player-container {
      margin-top: 1rem;
      padding: 1rem;
      background: rgba(30, 41, 59, 0.6);
      border-radius: 8px;
    }
    
    .audio-player-container audio {
      width: 100%;
      margin-top: 0.5rem;
    }
    
    .judge-box {
      background: rgba(51, 65, 85, 0.6);
      padding: 1.25rem;
      border-radius: 8px;
      border-left: 4px solid #3b82f6;
      margin-bottom: 1.5rem;
    }
    
    .judge-box strong {
      color: #60a5fa;
      display: block;
      margin-bottom: 0.5rem;
    }
    
    .transcript-section h3 {
      color: #f1f5f9;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    
    .turn-number {
      background: rgba(148, 163, 184, 0.2);
      color: #94a3b8;
      padding: 0.125rem 0.5rem;
      border-radius: 12px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    
    .message {
      margin-bottom: 1rem;
      padding: 1rem;
      border-radius: 12px;
      animation: fadeIn 0.3s;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .message.kunde {
      background: rgba(59, 130, 246, 0.15);
      border-left: 3px solid #3b82f6;
    }
    
    .message.nadine {
      background: rgba(139, 92, 246, 0.15);
      border-left: 3px solid #8b5cf6;
    }
    
    .message.system {
      background: rgba(148, 163, 184, 0.15);
      border-left: 3px solid #94a3b8;
    }
    
    .message-header {
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: #cbd5e1;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    
    .message-content {
      color: #e2e8f0;
      line-height: 1.6;
    }
    
    .loading {
      text-align: center;
      padding: 3rem;
      color: #94a3b8;
    }
    
    .empty-state {
      text-align: center;
      padding: 3rem;
      color: #94a3b8;
      font-style: italic;
    }
    
    .pagination {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      margin-top: 1.5rem;
      flex-wrap: wrap;
    }
    
    .pagination button {
      background: rgba(51, 65, 85, 0.8);
      border: 1px solid rgba(148, 163, 184, 0.3);
      color: #cbd5e1;
      padding: 0.5rem 1rem;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .pagination button:hover:not(:disabled) {
      background: rgba(59, 130, 246, 0.3);
    }
    
    .pagination button.active {
      background: #3b82f6;
      border-color: #3b82f6;
      color: white;
    }
    
    .pagination button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    /* Responsive Design */
    @media (max-width: 768px) {
      .container {
        padding: 1rem;
      }
      
      header {
        flex-direction: column;
        gap: 1rem;
        text-align: center;
      }
      
      .stats-grid {
        grid-template-columns: 1fr;
      }
      
      .section-header {
        flex-direction: column;
        align-items: flex-start;
      }
      
      .filter-buttons button {
        margin-left: 0;
        margin-bottom: 0.5rem;
      }
      
      table {
        font-size: 0.875rem;
      }
      
      th, td {
        padding: 0.75rem 0.5rem;
      }
      
      .modal-content {
        width: 95%;
        margin: 1rem auto;
      }
      
      .info-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div>
        <h1>🤖 LiveDialAI</h1>
        <p style="color: #94a3b8; font-size: 0.875rem; margin-top: 0.25rem;">Voice Bot Analytics Dashboard</p>
      </div>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </header>

    <div class="stats-grid" id="statsGrid">
      <div class="stat-card">
        <div class="stat-label">Total Calls</div>
        <div class="stat-value">-</div>
      </div>
      <div class="stat-card positive">
        <div class="stat-label">✅ Positiv</div>
        <div class="stat-value">-</div>
      </div>
      <div class="stat-card negative">
        <div class="stat-label">❌ Negativ</div>
        <div class="stat-value">-</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">⏱️ Avg. Duration</div>
        <div class="stat-value">-</div>
      </div>
      <!-- Audio Stats werden hier dynamisch eingefügt -->
    </div>

    <div class="calls-section">
      <div class="section-header">
        <h2>📞 Recent Calls</h2>
        <div class="filter-buttons">
          <button class="active" data-filter="all">All</button>
          <button data-filter="positiv">Positiv</button>
          <button data-filter="negativ">Negativ</button>
          <button data-filter="hasAudio">🎤 With Audio</button>
        </div>
      </div>

      <div id="callsContainer">
        <div class="loading">Loading calls...</div>
      </div>

      <div class="pagination" id="pagination"></div>
    </div>
  </div>

  <div class="modal" id="callModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>📋 Call Details</h2>
        <button class="close-btn" onclick="closeModal()">×</button>
      </div>
      <div class="modal-body" id="modalBody">
        <div class="loading">Loading...</div>
      </div>
    </div>
  </div>

  <script>
    let currentPage = 1;
    let currentFilter = 'all';

    async function loadStats() {
      try {
        const res = await fetch('/api/overview');
        const stats = await res.json();
        
        const cards = document.querySelectorAll('.stat-card');
        cards[0].querySelector('.stat-value').textContent = stats.totalCalls;
        cards[1].querySelector('.stat-value').textContent = stats.positivLeads;
        cards[2].querySelector('.stat-value').textContent = stats.negativLeads;
        cards[3].querySelector('.stat-value').textContent = `${stats.avgDuration}s`;
        
        // Audio Stats hinzufügen
        if (stats.audioStorage) {
          const existingAudioCard = document.querySelector('.stat-card.audio');
          if (!existingAudioCard) {
            const audioHTML = `
              <div class="stat-card audio">
                <div class="stat-label">🎤 Audio Files</div>
                <div class="stat-value">${stats.audioStorage.totalFiles || 0}</div>
                <div class="stat-subtext">
                  ${stats.audioStorage.totalSizeMB || 0} MB gespeichert
                </div>
              </div>
            `;
            document.getElementById('statsGrid').insertAdjacentHTML('beforeend', audioHTML);
          } else {
            existingAudioCard.querySelector('.stat-value').textContent = stats.audioStorage.totalFiles || 0;
            existingAudioCard.querySelector('.stat-subtext').textContent = 
              `${stats.audioStorage.totalSizeMB || 0} MB gespeichert`;
          }
        }
      } catch (e) {
        console.error('Failed to load stats:', e);
      }
    }

    async function loadCalls(page = 1, filter = 'all') {
      currentPage = page;
      currentFilter = filter;
      
      const container = document.getElementById('callsContainer');
      container.innerHTML = '<div class="loading">Loading calls...</div>';
      
      try {
        const res = await fetch(`/api/calls?page=${page}&filter=${filter}&limit=20`);
        const data = await res.json();
        
        if (data.calls.length === 0) {
          container.innerHTML = '<div class="empty-state">No calls found</div>';
          return;
        }
        
        const table = `
          <table>
            <thead>
              <tr>
                <th>Time</th>
                <th>Lead ID</th>
                <th>From</th>
                <th>Duration</th>
                <th>Status</th>
                <th>Messages</th>
                <th>🎤</th>
                <th>Booked</th>
              </tr>
            </thead>
            <tbody>
              ${data.calls.map(call => `
                <tr onclick="openCallDetails('${call.callSid}')">
                  <td>${new Date(call.timestamp).toLocaleString('de-DE')}</td>
                  <td>${call.leadId || '-'}</td>
                  <td>${call.from}</td>
                  <td>${call.duration}s</td>
                  <td><span class="status-badge ${call.leadStatus.toLowerCase()}">${call.leadStatus}</span></td>
                  <td>${call.conversationLength || 0} turns</td>
                  <td>
                    ${call.audioRecording ? 
                      '<span class="audio-icon" title="Audio verfügbar">🎤</span>' : 
                      '<span style="color: #475569;">-</span>'}
                  </td>
                  <td>${call.booked ? '✅' : '-'}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        `;
        
        container.innerHTML = table;
        renderPagination(data.pagination);
      } catch (e) {
        container.innerHTML = '<div class="empty-state">Error loading calls</div>';
        console.error('Failed to load calls:', e);
      }
    }

    function renderPagination(pagination) {
      const container = document.getElementById('pagination');
      const buttons = [];
      
      if (pagination.page > 1) {
        buttons.push(`<button onclick="loadCalls(${pagination.page - 1}, '${currentFilter}')">Previous</button>`);
      }
      
      // Zeige max 7 Seitenzahlen
      const maxButtons = 7;
      let startPage = Math.max(1, pagination.page - Math.floor(maxButtons / 2));
      let endPage = Math.min(pagination.pages, startPage + maxButtons - 1);
      
      if (endPage - startPage < maxButtons - 1) {
        startPage = Math.max(1, endPage - maxButtons + 1);
      }
      
      if (startPage > 1) {
        buttons.push(`<button onclick="loadCalls(1, '${currentFilter}')">1</button>`);
        if (startPage > 2) buttons.push(`<button disabled>...</button>`);
      }
      
      for (let i = startPage; i <= endPage; i++) {
        if (i === pagination.page) {
          buttons.push(`<button class="active">${i}</button>`);
        } else {
          buttons.push(`<button onclick="loadCalls(${i}, '${currentFilter}')">${i}</button>`);
        }
      }
      
      if (endPage < pagination.pages) {
        if (endPage < pagination.pages - 1) buttons.push(`<button disabled>...</button>`);
        buttons.push(`<button onclick="loadCalls(${pagination.pages}, '${currentFilter}')">${pagination.pages}</button>`);
      }
      
      if (pagination.page < pagination.pages) {
        buttons.push(`<button onclick="loadCalls(${pagination.page + 1}, '${currentFilter}')">Next</button>`);
      }
      
      container.innerHTML = buttons.join('');
    }

    async function openCallDetails(callSid) {
      const modal = document.getElementById('callModal');
      const body = document.getElementById('modalBody');
      
      modal.classList.add('active');
      body.innerHTML = '<div class="loading">Loading call details...</div>';
      
      try {
        const res = await fetch(`/api/call/${callSid}`);
        const call = await res.json();
        
        let html = `
          <div class="info-section">
            <h3>📊 Call Information</h3>
            <div class="info-grid">
              <div class="info-item">
                <span class="info-label">Call SID</span>
                <span class="info-value">${call.callSid}</span>
              </div>
              <div class="info-item">
                <span class="info-label">Lead ID</span>
                <span class="info-value">${call.leadId || 'N/A'}</span>
              </div>
              <div class="info-item">
                <span class="info-label">From</span>
                <span class="info-value">${call.from}</span>
              </div>
              <div class="info-item">
                <span class="info-label">Duration</span>
                <span class="info-value">${call.duration}s</span>
              </div>
              <div class="info-item">
                <span class="info-label">Time</span>
                <span class="info-value">${new Date(call.timestamp).toLocaleString('de-DE')}</span>
              </div>
              <div class="info-item">
                <span class="info-label">Status</span>
                <span class="info-value"><span class="status-badge ${call.leadStatus.toLowerCase()}">${call.leadStatus}</span></span>
              </div>
              <div class="info-item">
                <span class="info-label">Booked</span>
                <span class="info-value">${call.booked ? '✅ Yes' : '❌ No'}</span>
              </div>
              <div class="info-item">
                <span class="info-label">VicDial Updated</span>
                <span class="info-value">${call.vicidialUpdated ? '✅ Yes' : '❌ No'}</span>
              </div>
            </div>
          </div>
        `;
        
        // Audio Recording Section
        if (call.audioRecording) {
          const audioRec = call.audioRecording;
          const fileName = audioRec.fileName || audioRec.url.split('/').pop();
          const sizeKB = audioRec.size ? Math.round(audioRec.size / 1024) : 'N/A';
          const duration = audioRec.duration || 0;
          
          html += `
            <div class="info-section audio-section">
              <h3>🎤 Audio Recording</h3>
              <div class="info-grid">
                <div class="info-item">
                  <span class="info-label">Datei</span>
                  <span class="info-value">${fileName}</span>
                </div>
                <div class="info-item">
                  <span class="info-label">Größe</span>
                  <span class="info-value">${sizeKB} KB</span>
                </div>
                <div class="info-item">
                  <span class="info-label">Dauer</span>
                  <span class="info-value">${duration}s</span>
                </div>
                <div class="info-item">
                  <span class="info-label">Format</span>
                  <span class="info-value">${audioRec.format || 'WAV'}</span>
                </div>
              </div>
              <div class="audio-player-container">
                <div style="color: #94a3b8; font-size: 0.875rem; margin-bottom: 0.5rem;">
                  🎧 Audio Player
                </div>
                <audio controls preload="metadata" style="width: 100%;">
                  <source src="${audioRec.url}" type="${getAudioMimeType(audioRec.format || 'wav')}">
                  Your browser does not support the audio element.
                </audio>
                <div style="margin-top: 0.5rem;">
                  <a href="${audioRec.url}" download="${fileName}" style="color: #60a5fa; text-decoration: none; font-size: 0.875rem;">
                    ⬇️ Download Audio
                  </a>
                </div>
              </div>
            </div>
          `;
        }
        
        if (call.judgeAnalyse) {
          html += `
            <div class="judge-box">
              <strong>🤖 Judge Analyse:</strong>
              ${call.judgeAnalyse}
            </div>
          `;
        }
        
        html += `<div class="transcript-section">
          <h3>💬 Transcript <span class="turn-number">${call.conversationLength || 0} messages</span></h3>
        `;
        
        if (call.conversation && call.conversation.length > 0) {
          call.conversation.forEach((msg, idx) => {
            const roleClass = msg.role.toLowerCase();
            const icon = msg.role === 'KUNDE' ? '👤' : msg.role === 'NADINE' ? '🤖' : '⚙️';
            
            html += `
              <div class="message ${roleClass}">
                <div class="message-header">
                  ${icon} ${msg.role} <span class="turn-number">#${idx + 1}</span>
                </div>
                <div class="message-content">${msg.content}</div>
              </div>
            `;
          });
        } else {
          html += '<div class="empty-state">No transcript available</div>';
        }
        
        html += '</div>';
        body.innerHTML = html;
      } catch (e) {
        body.innerHTML = '<div class="empty-state">Error loading call details</div>';
        console.error('Failed to load call details:', e);
      }
    }
    
    function getAudioMimeType(format) {
      const mimeTypes = {
        'wav': 'audio/wav',
        'mp3': 'audio/mpeg',
        'ogg': 'audio/ogg',
        'm4a': 'audio/mp4',
        'flac': 'audio/flac'
      };
      return mimeTypes[format.toLowerCase()] || 'audio/wav';
    }

    function closeModal() {
      document.getElementById('callModal').classList.remove('active');
    }

    function logout() {
      window.location.href = '/logout';
    }

    // Filter buttons
    document.querySelectorAll('.filter-buttons button').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-buttons button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        loadCalls(1, btn.dataset.filter);
      });
    });

    // Close modal on background click
    document.getElementById('callModal').addEventListener('click', (e) => {
      if (e.target.id === 'callModal') closeModal();
    });
    
    // Keyboard shortcut: ESC to close modal
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        closeModal();
      }
    });

    // Initial load
    loadStats();
    loadCalls();
    
    // Auto-refresh every 30 seconds
    setInterval(() => {
      loadStats();
      loadCalls(currentPage, currentFilter);
    }, 30000);
  </script>
</body>
</html>
